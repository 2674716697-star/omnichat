<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>OmniChat 更新</title>
<style>
  body {
    margin:0; padding:24px;
    background:#000; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100vh; text-align:center;
    -webkit-font-smoothing:antialiased;
  }
  .spinner {
    width:32px; height:32px; border:3px solid rgba(255,255,255,0.15);
    border-top-color:#0A84FF; border-radius:50%;
    animation:spin 0.8s linear infinite; margin-bottom:20px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  h2 { font-size:20px; font-weight:600; margin-bottom:8px; }
  p { font-size:14px; color:rgba(255,255,255,0.6); max-width:260px; line-height:1.5; }
</style>
</head>
<body>
<div class="spinner"></div>
<h2>正在更新 OmniChat</h2>
<p id="status">清除旧缓存…</p>
<script>
(async function() {
  var s = document.getElementById('status');

  // Step 1: Unregister all service workers
  s.textContent = '移除旧版本…';
  try {
    var regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(function(r) { return r.unregister(); }));
  } catch(e) {}

  // Step 2: Delete all caches
  s.textContent = '清理缓存…';
  try {
    var keys = await caches.keys();
    await Promise.all(keys.map(function(k) { return caches.delete(k); }));
  } catch(e) {}

  // Step 3: Clear sessionStorage
  try { sessionStorage.clear(); } catch(e) {}

  s.textContent = '更新完成，即将重启…';

  // Redirect to main page
  setTimeout(function() {
    window.location.href = './?v=' + Date.now();
  }, 1200);
})();
</script>
</body>
</html>
