<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27192%27 height=%27192%27 viewBox=%270 0 192 192%27%3E%3Crect width=%27192%27 height=%27192%27 rx=%2740%27 fill=%27%230f0f0f%27/%3E%3Cpath d=%27M96 52c-24 0-44 20-44 44s20 44 44 44 44-20 44-44-20-44-44-44zm0 16c15 0 28 13 28 28s-13 28-28 28-28-13-28-28 13-28 28-28z%27 fill=%27%234a9eff%27/%3E%3Ccircle cx=%2796%27 cy=%2796%27 r=%2716%27 fill=%27%236ab4ff%27/%3E%3C/svg%3E">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="manifest" href="manifest.json">
  <title>AI Chat Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" id="appContainer">

    <!-- Top Bar -->
    <header class="top-bar" id="topBar">
      <button class="btn-icon" id="btnToggleHistory" aria-label="历史会话" title="历史会话">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="top-bar-info" id="topBarInfo">
        <div class="conv-title" id="convTitle">新对话</div>
        <div class="top-bar-meta" id="topBarMeta">
          <span class="badge badge-provider" id="badgeProvider">--</span>
          <span class="badge badge-model" id="badgeModel">--</span>
          <span class="context-stats" id="contextStats"></span>
        </div>
      </div>
      <button class="btn-icon" id="btnToggleSettings" aria-label="设置" title="设置">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- History Drawer -->
    <div class="drawer-overlay" id="historyOverlay"></div>
    <aside class="drawer drawer-left" id="historyDrawer">
      <div class="drawer-header">
        <h2>历史会话</h2>
        <button class="btn-icon" id="btnCloseHistory" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="search-wrap">
        <input type="search" class="search-input" id="searchInput" placeholder="搜索会话标题或内容…" autocomplete="off">
      </div>
      <div class="conv-list" id="convList"></div>
      <div class="drawer-footer">
        <button class="btn btn-secondary btn-full" id="btnExportAll">导出全部 JSON</button>
        <button class="btn btn-secondary btn-full" id="btnImport">导入 JSON</button>
        <button class="btn btn-danger btn-full" id="btnClearAll">清空全部历史</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none">
      </div>
    </aside>

    <!-- Settings Drawer -->
    <div class="drawer-overlay" id="settingsOverlay"></div>
    <aside class="drawer drawer-right" id="settingsDrawer">
      <div class="drawer-header">
        <h2>设置</h2>
        <button class="btn-icon" id="btnCloseSettings" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-content" id="settingsContent">
        <!-- Provider -->
        <div class="setting-group">
          <label class="setting-label">服务商</label>
          <select class="select" id="selectProvider">
            <option value="xai">xAI / Grok</option>
            <option value="deepseek">DeepSeek</option>
          </select>
        </div>

        <!-- xAI API Key -->
        <div class="setting-group" id="groupXaiKey">
          <label class="setting-label">xAI API Key</label>
          <div class="input-with-toggle">
            <input type="password" class="input" id="inputXaiKey" placeholder="xai-..." autocomplete="off">
            <button class="btn-icon btn-toggle-vis" data-target="inputXaiKey" aria-label="显示/隐藏">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <!-- DeepSeek API Key -->
        <div class="setting-group" id="groupDeepseekKey">
          <label class="setting-label">DeepSeek API Key</label>
          <div class="input-with-toggle">
            <input type="password" class="input" id="inputDeepseekKey" placeholder="sk-..." autocomplete="off">
            <button class="btn-icon btn-toggle-vis" data-target="inputDeepseekKey" aria-label="显示/隐藏">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <!-- Model -->
        <div class="setting-group">
          <label class="setting-label">模型</label>
          <select class="select" id="selectModel"></select>
          <div class="setting-hint" id="modelHint"></div>
          <button class="btn btn-secondary btn-sm" id="btnRefreshModels">刷新模型列表</button>
        </div>

        <!-- Custom Model -->
        <div class="setting-group">
          <label class="setting-label">自定义模型名（可选）</label>
          <input type="text" class="input" id="inputCustomModel" placeholder="留空使用上方选择的模型">
        </div>

        <!-- System Prompt -->
        <div class="setting-group">
          <label class="setting-label">System Prompt</label>
          <textarea class="textarea" id="inputSystemPrompt" rows="3" placeholder="设置 AI 的行为和角色…"></textarea>
        </div>

        <!-- Parameters -->
        <div class="setting-group">
          <label class="setting-label">Temperature <span class="setting-range-val" id="tempVal">0.7</span></label>
          <input type="range" class="range" id="inputTemperature" min="0" max="2" step="0.05" value="0.7">
        </div>

        <div class="setting-group">
          <label class="setting-label">Top P <span class="setting-range-val" id="topPVal">1</span></label>
          <input type="range" class="range" id="inputTopP" min="0" max="1" step="0.05" value="1">
        </div>

        <div class="setting-group">
          <label class="setting-label">Max Tokens</label>
          <input type="number" class="input" id="inputMaxTokens" value="2000" min="1" step="1">
        </div>

        <!-- Stream Toggle -->
        <div class="setting-group setting-row">
          <label class="setting-label">流式输出 (Stream)</label>
          <label class="toggle">
            <input type="checkbox" id="inputStream" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- Tool Call Limit -->
        <div class="setting-group">
          <label class="setting-label">工具最大调用次数</label>
          <select class="select" id="selectToolCallLimit">
            <option value="0">0 - 关闭</option>
            <option value="1">1</option>
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="-1">无限</option>
          </select>
          <div class="tool-warning" id="toolWarning" style="display:none">
            无限工具调用可能导致循环执行、长时间运行或产生大量 API 费用，请谨慎使用。
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main-content" id="mainContent">
      <div class="messages-container" id="messagesContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </div>
          <h3>AI Chat Pro</h3>
          <p>支持 xAI / Grok 与 DeepSeek 多模型聊天</p>
          <p class="welcome-hint">请在设置中填写 API Key 并选择模型后开始对话</p>
        </div>
      </div>
    </main>

    <!-- Bottom Bar -->
    <footer class="bottom-bar" id="bottomBar">
      <div class="quick-actions" id="quickActions">
        <button class="btn-quick" id="btnQuickNew" title="新建对话">+ 新建</button>
        <button class="btn-quick" id="btnQuickClear" title="清空当前">清空</button>
        <button class="btn-quick" id="btnQuickDeleteLast" title="删除最后一轮">删轮</button>
        <button class="btn-quick" id="btnQuickCopy" title="复制最后回复">复制</button>
        <button class="btn-quick" id="btnQuickExport" title="导出 Markdown">导出</button>
      </div>
      <div class="input-row">
        <textarea class="input-message" id="inputMessage" rows="1" placeholder="输入消息…" autocomplete="off"></textarea>
        <button class="btn-send" id="btnSend" aria-label="发送">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
        <button class="btn-stop" id="btnStop" aria-label="停止" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="1"></rect>
          </svg>
        </button>
      </div>
      <div class="security-notice">
        API Key 保存在当前浏览器 localStorage。请勿在公共设备上使用。如需更高安全性，可升级为本地代理版本。
      </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Confirm Dialog -->
    <div class="dialog-overlay" id="dialogOverlay" style="display:none">
      <div class="dialog">
        <div class="dialog-body" id="dialogBody"></div>
        <div class="dialog-actions">
          <button class="btn btn-secondary" id="dialogCancel">取消</button>
          <button class="btn btn-danger" id="dialogConfirm">确认</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Rename Dialog -->
  <div class="dialog-overlay" id="renameDialogOverlay" style="display:none">
    <div class="dialog">
      <div class="dialog-body">
        <label class="setting-label">重命名会话</label>
        <input type="text" class="input" id="renameInput" placeholder="输入新标题">
      </div>
      <div class="dialog-actions">
        <button class="btn btn-secondary" id="renameCancel">取消</button>
        <button class="btn btn-primary" id="renameConfirm">确认</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}</script>
</body>
</html>
